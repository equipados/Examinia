<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — Examinia</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-md flex flex-col items-center">
    <!-- Logo grande encima de la tarjeta -->
    <img src="/static/logo1.jpg" alt="Examinia" class="w-80 object-contain mb-6 drop-shadow">

  <div class="bg-white rounded-2xl shadow-lg p-10 w-full">

    {% if error %}
    <div class="bg-red-50 border border-red-300 text-red-700 text-sm rounded px-4 py-3 mb-4">
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="username">Usuario</label>
        <input
          id="username" name="username" type="text" required autofocus
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="password">Contraseña</label>
        <input
          id="password" name="password" type="password" required
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
      </div>
      <button
        type="submit"
        class="w-full bg-blue-700 hover:bg-blue-600 text-white font-semibold py-2 rounded-lg transition"
      >
        Entrar
      </button>
    </form>
  </div>
  </div>
</body>
</html>
