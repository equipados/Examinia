{% extends "base.html" %}
{% block title %}Nueva convocatoria — Examinia{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
  <div class="mb-6">
    <a href="/" class="text-blue-600 hover:underline text-sm">&larr; Volver al inicio</a>
    <h1 class="text-2xl font-bold text-gray-900 mt-2">Nueva convocatoria</h1>
  </div>

  <form method="post" action="/sessions" class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 space-y-5">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1" for="name">Nombre *</label>
      <input id="name" name="name" type="text" required placeholder="Ej: Parcial 1 — Oct 2025"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="course_level">Curso</label>
        <select id="course_level" name="course_level"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="">Sin especificar</option>
          <option value="1o_bachillerato">1º Bachillerato</option>
          <option value="2o_bachillerato">2º Bachillerato</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="date">Fecha</label>
        <input id="date" name="date" type="date"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1" for="subject">Asignatura</label>
      <input id="subject" name="subject" type="text" placeholder="Ej: Matemáticas II"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1" for="max_total_points">
        Puntuación máxima total
      </label>
      <input id="max_total_points" name="max_total_points" type="number" step="0.5" min="1" max="100"
             placeholder="Ej: 10  (deja vacío para usar la del PDF)"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      <p class="text-xs text-gray-400 mt-1">Si se indica, las notas de todos los alumnos se normalizan a esta base.</p>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1" for="solver_provider">Modelo IA para resolver ejercicios</label>
      <select id="solver_provider" name="solver_provider"
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option value="gemini-pro">Gemini 2.5 Pro — mayor precisión matemática</option>
        <option value="gemini-flash">Gemini 2.5 Flash — más rápido y económico</option>
        <option value="openai-gpt4o">OpenAI GPT-4o — requiere OPENAI_API_KEY</option>
        <option value="openai-o4mini">OpenAI o4-mini — requiere OPENAI_API_KEY</option>
      </select>
      <p class="text-xs text-gray-400 mt-1">Puedes cambiarlo más adelante desde la convocatoria.</p>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1" for="notes">Notas internas</label>
      <textarea id="notes" name="notes" rows="3" placeholder="Observaciones, criterios especiales..."
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
    </div>

    <div class="flex gap-3 pt-2">
      <button type="submit"
              class="bg-blue-700 hover:bg-blue-600 text-white px-6 py-2 rounded-lg font-semibold transition">
        Crear convocatoria
      </button>
      <a href="/" class="px-6 py-2 rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-50 transition text-sm font-semibold">
        Cancelar
      </a>
    </div>
  </form>
</div>
{% endblock %}
