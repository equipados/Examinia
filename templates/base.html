<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Examinia{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    .status-done { @apply text-green-700 bg-green-100 px-2 py-0.5 rounded text-xs font-semibold; }
    .status-pending { @apply text-yellow-700 bg-yellow-100 px-2 py-0.5 rounded text-xs font-semibold; }
    .status-processing { @apply text-blue-700 bg-blue-100 px-2 py-0.5 rounded text-xs font-semibold; }
    .status-error { @apply text-red-700 bg-red-100 px-2 py-0.5 rounded text-xs font-semibold; }
    .status-revision { @apply text-orange-700 bg-orange-100 px-2 py-0.5 rounded text-xs font-semibold; }
    /* Tooltips de ayuda contextual */
    .help-tip {
      display: inline-flex; align-items: center; justify-content: center;
      width: 16px; height: 16px; border-radius: 50%;
      background: #e0e7ff; color: #4338ca; font-size: 11px; font-weight: 700;
      cursor: help; position: relative; flex-shrink: 0; margin-left: 4px;
      border: 1px solid #c7d2fe; vertical-align: middle;
    }
    .help-tip:hover { background: #c7d2fe; }
    .help-tip:hover::after {
      content: attr(data-help);
      position: absolute; bottom: calc(100% + 8px); left: 50%;
      transform: translateX(-50%);
      background: #1e293b; color: #f1f5f9;
      padding: 8px 12px; border-radius: 8px;
      font-size: 12px; font-weight: 400; line-height: 1.5;
      white-space: normal; width: max-content; max-width: 320px;
      z-index: 50; pointer-events: none;
      box-shadow: 0 4px 16px rgba(0,0,0,.3);
    }
    .help-tip:hover::before {
      content: ''; position: absolute;
      bottom: calc(100% + 4px); left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: #1e293b; z-index: 50; pointer-events: none;
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

  <!-- Navbar -->
  <nav class="bg-white border-b border-gray-200 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 py-2 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2">
        <img src="/static/logo2.jpg" alt="Examinia" class="h-9 w-auto object-contain">
        <span class="text-xl font-bold text-gray-800 tracking-tight hidden sm:inline">Examinia</span>
      </a>
      {% if user is defined and user %}
      <div class="flex items-center gap-4 text-sm text-gray-600">
        <a href="/reports/usage"
           class="text-gray-500 hover:text-gray-800 font-medium transition {% if request.url.path == '/reports/usage' %}text-blue-700 font-semibold{% endif %}">
          Costes IA
        </a>
        <a href="/reports/history"
           class="text-gray-500 hover:text-gray-800 font-medium transition {% if request.url.path == '/reports/history' %}text-blue-700 font-semibold{% endif %}">
          Historial
        </a>
        <a href="/students"
           class="text-gray-500 hover:text-gray-800 font-medium transition {% if request.url.path.startswith('/students') %}text-blue-700 font-semibold{% endif %}">
          Alumnos
        </a>
        <a href="/profile"
           class="text-gray-500 hover:text-gray-800 font-medium transition {% if request.url.path == '/profile' %}text-blue-700 font-semibold{% endif %}">
          Perfil
        </a>
        <a href="/help"
           class="text-gray-500 hover:text-gray-800 font-medium transition {% if request.url.path.startswith('/help') %}text-blue-700 font-semibold{% endif %}"
           title="Ayuda y guía de uso">
          ?
        </a>
        <span class="opacity-70">{{ user.display_name }}</span>
        <form method="post" action="/logout">
          <button class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1.5 rounded-lg transition text-sm font-medium">Cerrar sesión</button>
        </form>
      </div>
      {% endif %}
    </div>
  </nav>

  <!-- Main content -->
  <main class="flex-1 max-w-7xl mx-auto w-full px-4 py-8">
    {% block content %}{% endblock %}
  </main>

  <footer class="text-center text-xs text-gray-400 py-4">
    Examinia &mdash; Corrección inteligente de exámenes de matemáticas
    <span class="opacity-50 ml-2">v{{ app_version }}</span>
  </footer>
</body>
</html>
